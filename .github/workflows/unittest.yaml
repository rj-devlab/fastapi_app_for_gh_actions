name: Run Unittest

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest # Runners.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest
